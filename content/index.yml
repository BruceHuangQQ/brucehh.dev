about:
  title: "About Me"
  description: |
    I'm a software engineer who enjoys building full-stack applications and working with people from different backgrounds. I’ve been working as a full-stack developer since 2025, usually on practical projects where I take features from idea to delivery, break a few things along the way, and then fix them properly. I’m also a Computer Science major at Swinburne University, and I enjoy applying what I learn at uni to how I build software (after a healthy amount of debugging).
