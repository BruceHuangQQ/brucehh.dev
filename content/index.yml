miscellaneous:
  title: "Miscellaneous"
  description: "I'm actively involved in competitive speedcubing and regularly compete in official World Cube Association competitions."
  content: |
    ## Miscellaneous
    I'm actively involved in competitive Rubik's Cube solving ("speedcubing") and regularly compete in official [World Cube Association](https://www.worldcubeassociation.org/persons/2016HUAN38) competitions. I did my first official speedcubing competition back in 2016 at 南武中學 (Nanwu Middle School), in a cross-strait event bringing together competitors from Mainland China, Hong Kong, and Taiwan.

    I now compete far less often but still maintain a sub-10 average. Muscle memory never really left. 

    ## Contact me

    Email: [brucewonghh@outlook.com](mailto:brucewonghh@outlook.com)  
    Phone: [+61 0490905084](tel:+61490905084)
